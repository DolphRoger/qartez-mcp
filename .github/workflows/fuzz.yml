name: Fuzz

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      duration:
        description: "Per-target fuzz duration in seconds"
        required: false
        default: "120"

permissions: read-all

concurrency:
  group: fuzz-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: cargo-fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - parse_boundary_config
          - parse_security_config
    steps:
      - name: Harden runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable @ 2026-03-27
        with:
          toolchain: nightly

      - name: Cache cargo and fuzz artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: "fuzz -> target"
          shared-key: fuzz-${{ matrix.target }}

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked --version "^0.12"

      - name: Run fuzz target
        run: |
          DURATION="${{ github.event.inputs.duration || '120' }}"
          cargo +nightly fuzz run "${{ matrix.target }}" -- \
            -max_total_time="${DURATION}" \
            -rss_limit_mb=2048 \
            -print_final_stats=1

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/
          if-no-files-found: ignore
          retention-days: 14
